<header
    class="site-header tw-fixed tw-z-20 tw-flex tw-min-h-[4rem] tw-h-auto tw-w-full tw-text-gray-700 tw-bg-white tw-shadow-md lg:!tw-backdrop-blur-lg"
>
    <a class="site-header__brand" href="index.html" aria-label="Che Bolis — Inicio">
        <span class="site-header__name" aria-hidden="true">
            <span class="site-header__name-che">Che</span><span class="site-header__name-bolis"> Bolis</span>
        </span>
    </a>
    <div class="collapsible-header animated-collapse max-lg:tw-shadow-md" id="collapsed-header-items">
        <nav class="site-header__nav tw-relative tw-flex tw-h-full max-lg:tw-h-max tw-w-max tw-gap-5 tw-text-base max-lg:tw-mt-[30px] max-lg:tw-flex-col max-lg:tw-gap-5 tw-place-items-center">
            <a class="header-links" data-nav="inicio" href="index.html">Inicio</a>
            <a class="header-links" data-nav="bolizada" href="bolizada.html">Armar Bolizada</a>
            <a class="header-links" data-nav="domicilio" href="domicilio.html">Domicilio</a>
            <a class="header-links" data-nav="pago" href="pago.html">Pago</a>
            <a class="header-links" data-nav="inicio" href="index.html#pricing">Combos</a>
        </nav>
        <div class="site-header__actions site-header__actions--menu lg:tw-hidden tw-flex tw-place-items-center tw-gap-[20px] tw-text-base max-md:tw-w-full max-md:tw-flex-col max-md:tw-place-content-center">
            <a href="bolizada.html" class="btn tw-flex tw-gap-3 tw-px-3 tw-py-2 tw-transition-transform tw-duration-[0.3s] hover:tw-translate-x-2">
                <span>Pedir Bolizada</span>
                <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>
    <div class="site-header__toolbar">
        <button
            type="button"
            onclick="toggleMode()"
            class="site-header__theme-toggle header-links"
            title="Cambiar tema"
            id="theme-toggle"
            aria-label="Cambiar tema claro u oscuro"

            <i class="bi bi-sun" id="toggle-mode-icon" aria-hidden="true"></i>
        </button>
        <div class="site-header__actions site-header__actions--bar max-lg:tw-hidden tw-flex tw-place-items-center">
            <a href="bolizada.html" class="btn tw-flex tw-gap-3 tw-px-3 tw-py-2 tw-transition-transform tw-duration-[0.3s] hover:tw-translate-x-2">
                <span>Pedir Bolizada</span>
                <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>
    <button
        type="button"
        class="site-header__menu-btn bi bi-list lg:tw-hidden"
        onclick="toggleHeader()"
        aria-label="Abrir menú"
        id="collapse-btn"
    ></button>
</header>
